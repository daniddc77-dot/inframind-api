steps:
- name: gcr.io/cloud-builders/docker 
  args:
  - build
  - -t
  - europe-southwest1-docker.pkg.dev/$PROJECT_ID/inframind/inframind-api:$SHORT_SHA
  - .

- name: gcr.io/cloud-builders/docker
  args:
  - push
  - europe-southwest1-docker.pkg.dev/$PROJECT_ID/inframind/inframind-api:$SHORT_SHA

- name: gcr.io/cloud-builders/gcloud
  args:
  - run
  - deploy
  - inframind-api
  - --image
  - europe-southwest1-docker.pkg.dev/$PROJECT_ID/inframind/inframind-api:$SHORT_SHA
  - --region
  - europe-southwest1
  - --platform
  - managed
  - --allow-unauthenticated
  - --quiet
  
- images:
  - europe-southwest1-docker.pkg.dev/$PROJECT_ID/inframind/inframind-api:$SHORT_SHA